<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Econova - My Profile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg-cream: #FAF9F2;
      --text-green: #2D6A4F;
      --text-main: #111827;
      --text-muted: #6B7280;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
    }

    body {
      background-color: var(--bg-cream);
      font-family: 'Inter', sans-serif;
      color: var(--text-main);
      margin: 0;
    }

    .page-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 24px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      color: var(--text-main);
      font-weight: 800;
      text-decoration: none;
      font-size: 24px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-link {
      text-decoration: none;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 15px;
      transition: color 0.2s;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text-main);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
    }

    .btn-create {
      background: #1B2420;
      color: white;
      padding: 10px 24px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
    }

    .profile-layout {
      max-width: 1200px;
      margin: 20px auto 60px;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 40px;
    }

    /* Left Column: Sidebar */
    .sidebar {
      text-align: center;
    }

    .main-avatar-container {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto 24px;
    }

    .main-avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 4px solid white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      background-color: #eee;
    }

    .verified-badge {
      position: absolute;
      bottom: 15px;
      right: 15px;
      width: 28px;
      height: 28px;
      background: #2D6A4F;
      border-radius: 50%;
      border: 3px solid white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
    }

    .user-name {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .tag-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .user-tag {
      background: #E8F2EC;
      color: #2D6A4F;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Right Column: Content */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: white;
      padding: 32px 20px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      text-align: center;
    }

    .stat-icon {
      font-size: 24px;
      margin-bottom: 12px;
      color: var(--text-green);
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .badges-card {
      background: white;
      padding: 32px 40px;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin-bottom: 60px;
    }

    .badges-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 18px;
      font-weight: 700;
    }

    .badge-list {
      display: flex;
      gap: 32px;
    }

    .badge-item {
      text-align: center;
    }

    .badge-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 12px;
      background: #F3F4F6;
    }

    .badge-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
    }

    /* Impact Section */
    .impact-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 32px;
    }

    .impact-title-group h2 {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 8px 0;
    }

    .impact-title-group p {
      color: var(--text-muted);
      margin: 0;
      font-size: 15px;
    }

    .btn-view-all {
      border: 2px solid #2D6A4F;
      color: #2D6A4F;
      padding: 10px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    .post-card {
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .post-image {
      height: 200px;
      background-size: cover;
      background-position: center;
      background-color: #eee;
    }

    .post-info {
      padding: 24px;
    }

    .post-date {
      font-size: 11px;
      color: #9CA3AF;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .post-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .post-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .post-actions {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Edit Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 2000;
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: white;
      padding: 40px;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 500px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #D1D5DB;
      border-radius: 10px;
      font-family: inherit;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-size: 14px;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #D1D5DB;
    }

    .btn-dark {
      background: #1B2420;
      color: white;
    }

    @media (max-width: 1024px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }

      .posts-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
  <div class="page-container">
    <header class="header">
      <a href="index.html" class="logo">Econova</a>
      <nav class="nav-links">
        <a href="explore.html" class="nav-link">Explore</a>
        <a href="campaigns.html" class="nav-link">Campaigns</a>
        <a href="map.html" class="nav-link">Map</a>
      </nav>
      <div class="nav-actions">
        <div class="nav-avatar" id="navAvatar"></div>
        <a href="signup.html" class="btn-create">Create</a>
      </div>
    </header>

    <main class="profile-layout">
      <!-- Left Sidebar -->
      <aside class="sidebar">
        <div class="main-avatar-container">
          <div class="main-avatar" id="mainAvatar"></div>
          <div class="verified-badge">✓</div>
        </div>
        <h1 class="user-name" id="userName">...</h1>
        <div class="tag-container" id="userTags">
          <span class="user-tag">Eco Steward</span>
        </div>
        <p id="userBio" style="margin-top: 24px; color: var(--text-muted); font-size: 14px; line-height: 1.6;"></p>
        <button class="btn btn-outline" style="margin-top: 32px; width: 100%;" onclick="openModal()">Edit
          Profile</button>
      </aside>

      <!-- Right Content -->
      <section class="content">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon">♻️</div>
            <div class="stat-value" id="val-plastic">0kg</div>
            <div class="stat-label">plastic removed</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📢</div>
            <div class="stat-value" id="val-campaigns">0</div>
            <div class="stat-label">campaigns joined</div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🌲</div>
            <div class="stat-value" id="val-trees">0</div>
            <div class="stat-label">trees planted</div>
          </div>
        </div>

        <div class="badges-card">
          <div class="badges-header">🏆 Environmental Badges</div>
          <div class="badge-list" id="badgeList">
            <!-- Badges via JS -->
          </div>
        </div>

        <div class="impact-header">
          <div class="impact-title-group">
            <h2>Personal Impact & Involvement</h2>
            <p id="impactDesc">Track your journey and current active campaigns</p>
          </div>
          <a href="explore.html" class="btn-view-all">View All Posts</a>
        </div>

        <div class="posts-grid" id="postsGrid">
          <!-- Posts via JS -->
        </div>
      </section>
    </main>
  </div>

  <!-- Edit Modal -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2 style="margin-top: 0; margin-bottom: 24px;">Edit Profile</h2>
      <form id="editForm">
        <div class="form-group">
          <label>FULL NAME</label>
          <input type="text" id="editName" required>
        </div>
        <div class="form-group">
          <label>EMAIL ADDRESS</label>
          <input type="email" id="editEmail" required>
        </div>
        <div class="form-group">
          <label>BIO / ABOUT ME</label>
          <textarea id="editBio" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label>PROFILE PICTURE</label>
          <input type="file" id="editFile" accept="image/*">
        </div>
        <div class="form-group">
          <label>NEW PASSWORD</label>
          <input type="password" id="editPass" placeholder="Leave blank to keep same">
        </div>
        <div style="display: flex; gap: 12px; margin-top: 32px;">
          <button type="button" class="btn btn-outline" style="flex: 1;" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-dark" style="flex: 1;">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let user = JSON.parse(localStorage.getItem('user'));
    if (!user) window.location.href = 'login.html';

    function init() {
      // Basic Info
      document.getElementById('userName').textContent = user.name;
      document.getElementById('userBio').textContent = user.bio || "Dedicated to restoring the Earth's natural balance through local action.";
      document.getElementById('impactDesc').textContent = `Track ${user.name.split(' ')[0]}'s journey and current active campaigns`;

      const avatarPath = (user.avatar && user.avatar.startsWith('http')) ? user.avatar : `http://localhost:3000${user.avatar || '/uploads/default.png'}`;
      document.getElementById('mainAvatar').style.backgroundImage = `url('${avatarPath}')`;
      document.getElementById('navAvatar').style.backgroundImage = `url('${avatarPath}')`;

      // Tags logic (example)
      const tagsContainer = document.getElementById('userTags');
      tagsContainer.innerHTML = '<span class="user-tag">Eco Steward</span>';
      if (user.trees_planted > 10) tagsContainer.innerHTML += '<span class="user-tag">Forest Guardian</span>';
      if (user.plastic_removed > 10) tagsContainer.innerHTML += '<span class="user-tag">Ocean Protector</span>';

      loadStatsAndBadges();
      loadPosts();
    }

    async function loadStatsAndBadges() {
      try {
        const res = await fetch(`http://localhost:3000/api/user/${user.id}/stats`);
        const stats = await res.json();

        document.getElementById('val-plastic').textContent = (stats.plastic || 0) + 'kg';
        document.getElementById('val-campaigns').textContent = stats.campaigns || 0;
        document.getElementById('val-trees').textContent = stats.trees || 0;

        renderBadges(stats);
      } catch (err) { console.error(err); }
    }

    function renderBadges(stats) {
      const container = document.getElementById('badgeList');
      const badgeData = [];
      if (stats.trees >= 1) badgeData.push({ name: 'Early Steward', icon: '🌱', color: '#FEF3C7' });
      if (stats.plastic >= 10) badgeData.push({ name: 'River Guardian', icon: '💧', color: '#D1FAE5' });
      if (stats.compost >= 5) badgeData.push({ name: 'Soil Master', icon: '🪵', color: '#F3F4F6' });

      if (badgeData.length === 0) {
        container.innerHTML = '<p style="color: var(--text-muted); font-size: 13px;">Complete impact stories to earn badges!</p>';
        return;
      }

      container.innerHTML = badgeData.map(b => `
        <div class="badge-item">
          <div class="badge-circle" style="background: ${b.color}">${b.icon}</div>
          <div class="badge-label">${b.name}</div>
        </div>
      `).join('');
    }

    async function loadPosts() {
      try {
        const res = await fetch(`http://localhost:3000/api/user/${user.id}/posts`);
        const posts = await res.json();
        const grid = document.getElementById('postsGrid');

        if (!posts || posts.length === 0) {
          grid.innerHTML = '<p style="color: var(--text-muted); grid-column: span 3; text-align: center;">No posts shared yet.</p>';
          return;
        }

        grid.innerHTML = posts.map(p => `
          <div class="post-card">
            <div class="post-image" style="background-image: url('http://localhost:3000${p.after_image || '/uploads/default-impact.png'}')"></div>
            <div class="post-info">
              <div class="post-date">${new Date(p.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
              <div class="post-title">${p.title}</div>
              <p class="post-desc">${p.description.substring(0, 80)}...</p>
              <div class="post-actions">
                <span>❤️ ${p.likes_count}</span>
                <span>💬 ${p.comments_count}</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (err) { console.error(err); }
    }

    // Modal
    function openModal() {
      document.getElementById('editModal').style.display = 'flex';
      document.getElementById('editName').value = user.name;
      document.getElementById('editEmail').value = user.email;
      document.getElementById('editBio').value = user.bio || '';
    }

    function closeModal() {
      document.getElementById('editModal').style.display = 'none';
    }

    document.getElementById('editForm').onsubmit = async (e) => {
      e.preventDefault();
      const file = document.getElementById('editFile').files[0];
      let finalAvatar = user.avatar;

      if (file) {
        const fd = new FormData();
        fd.append('avatar', file);
        fd.append('userId', user.id);
        const upRes = await fetch('http://localhost:3000/api/auth/upload', { method: 'POST', body: fd });
        const upData = await upRes.json();
        if (upData.success) finalAvatar = upData.avatar;
      }

      const res = await fetch('http://localhost:3000/api/user/profile', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userId: user.id,
          name: document.getElementById('editName').value,
          email: document.getElementById('editEmail').value,
          bio: document.getElementById('editBio').value,
          password: document.getElementById('editPass').value,
          avatar: finalAvatar
        })
      });

      const data = await res.json();
      if (data.success) {
        user = data.user;
        localStorage.setItem('user', JSON.stringify(user));
        init();
        closeModal();
        alert('Profile updated!');
      }
    };

    init();
  </script>
</body>

</html>
